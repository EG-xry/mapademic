<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>mapademic dev preview</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    html, body, #map { margin: 0; height: 100%; background: #000; }
    .lbl { color: #fff; font-family: system-ui, sans-serif;
           text-shadow: 0 0 4px #000, 0 0 8px #000; pointer-events: none;

    #search-dropdown.open { display: block; }
    #search-dropdown .row { padding: 6px 10px; cursor: pointer; display: flex;
                             justify-content: space-between; gap: 8px; color: #ddd; }

    }

    #search-top { display: flex; gap: 6px; align-items: stretch; }
    #search-top #search-input { width: auto; flex: 1; min-width: 0; }
    #connect-toggle { background: #0b0b0bd9; color: #ddd; border: 1px solid #333;
                       border-radius: 6px; padding: 6px 10px; font: 12px system-ui;
                       cursor: pointer; white-space: nowrap; }
    #connect-toggle:hover { border-color: #7fae8e; }
    #connect-toggle.active { border-color: #7fae8e; color: #7fae8e; }
    #connect-panel { margin-top: 6px; display: none; flex-direction: column; gap: 6px; }
    #connect-panel.open { display: flex; }
    .connect-row { position: relative; }
    .connect-row input { width: 100%; box-sizing: border-box; background: #0b0b0bd9;
                          color: #ddd; border: 1px solid #333; border-radius: 6px;
                          padding: 6px 10px; font: 13px system-ui; outline: none; }
    .connect-row input:focus { border-color: #7fae8e; }
    .connect-dropdown { position: absolute; left: 0; top: 100%; margin-top: 4px;
                         width: 100%; background: #0b0b0bd9; border-radius: 6px;
                         max-height: 220px; overflow-y: auto; display: none; z-index: 10; }
    .connect-dropdown.open { display: block; }
    .connect-dropdown .row { padding: 6px 10px; cursor: pointer; display: flex;
                              justify-content: space-between; gap: 8px; color: #ddd; }
    .connect-dropdown .row:hover, .connect-dropdown .row.active { background: #ffffff1a; }
    .connect-dropdown .row .n { color: #888; }
    .connect-dropdown .row.empty { color: #888; cursor: default; }
    .connect-actions { display: flex; gap: 6px; }
    .connect-actions button { flex: 1; background: #0b0b0bd9; color: #ddd;
                               border: 1px solid #333; border-radius: 6px;
                               padding: 6px 10px; font: 12px system-ui; cursor: pointer; }
    .connect-actions button:hover { border-color: #7fae8e; }
    #connect-status { font: 12px system-ui; color: #9ab; background: #0b0b0bd9;
                       border-radius: 6px; padding: 4px 10px; min-height: 14px; }
    .path-node { display: flex; flex-direction: column; align-items: center;
                 pointer-events: none; }
    .path-dot { width: 10px; height: 10px; border-radius: 50%;
                background: #7fae8e; border: 2px solid #7fae8e; box-sizing: border-box; }
    .path-node.ghost .path-dot { background: transparent; }
    .path-label { color: #fff; font: 12px system-ui; text-shadow: 0 0 4px #000, 0 0 8px #000;
                  white-space: nowrap; margin-top: 2px; }
    /* ---- Task 1 (night-polish): display settings panel ---- */
    #display-gear { position: fixed; right: 10px; bottom: 46px; z-index: 9;
                     width: 30px; height: 30px; background: #0b0b0bd9; color: #ddd;
                     border: 1px solid #333; border-radius: 6px; cursor: pointer;
                     font: 15px system-ui; line-height: 1; }
    #display-gear:hover { border-color: #7fae8e; }
    #display-panel { position: fixed; right: 10px; bottom: 82px; background: #0b0b0bd9;
                      color: #ddd; font: 12px system-ui; border-radius: 6px;
                      width: 230px; z-index: 9; display: none; }
    #display-panel.open { display: block; }
    #display-panel .dp-body { padding: 4px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    #display-panel .dp-row { display: flex; flex-direction: column; gap: 2px; }
    #display-panel .dp-row-head { display: flex; justify-content: space-between; align-items: center; }
    #display-panel .dp-row-head .n { color: #888; }
    #display-panel input[type="range"] { width: 100%; }
    #display-panel .dp-radios { display: flex; gap: 10px; }
    #display-panel .dp-radios label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    #display-panel .dp-check { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    #display-reset { background: #0b0b0bd9; color: #ddd; border: 1px solid #333;
                      border-radius: 6px; padding: 6px 10px; font: 12px system-ui; cursor: pointer; }
    #display-reset:hover { border-color: #7fae8e; }
  </style>
</head>
<body>
<div id="map"></div>
<div id="tip"></div>
<div id="search">
  <div id="search-top">
    <input id="search-input" type="text" placeholder="Search authors…" autocomplete="off">
    <button id="connect-toggle" type="button">Connect</button>
  </div>
  <div id="search-dropdown"></div>
  <div id="connect-panel">
    <div class="connect-row">
      <input id="connect-a-input" type="text" placeholder="Author A…" autocomplete="off">

    </div>
    <div class="connect-row">
      <input id="connect-b-input" type="text" placeholder="Author B…" autocomplete="off">

    </div>
    <div class="connect-actions">

</div>
<details id="legend" open><summary>Legend</summary><div id="legend-rows"></div></details>
<button id="display-gear" type="button" aria-label="Display settings" aria-expanded="false">&#9881;</button>
<div id="display-panel" role="region" aria-label="Display settings">
  <div class="dp-body">
    <div class="dp-row">
      <div class="dp-row-head"><label for="dp-brightness">Brightness</label><span id="dp-brightness-n" class="n"></span></div>
      <input id="dp-brightness" type="range" min="0.6" max="1.0" step="0.02" value="1.0">
    </div>
    <div class="dp-row">
      <div class="dp-row-head"><label for="dp-contrast">Contrast</label><span id="dp-contrast-n" class="n"></span></div>
      <input id="dp-contrast" type="range" min="-0.4" max="0.4" step="0.04" value="0">

    <div class="dp-row">
      <div class="dp-row-head"><label for="dp-saturation">Saturation</label><span id="dp-saturation-n" class="n"></span></div>
      <input id="dp-saturation" type="range" min="-0.6" max="0.6" step="0.06" value="0">
    </div>

      <div class="dp-row-head"><span>Label density</span></div>
      <div class="dp-radios" role="radiogroup" aria-label="Label density">
        <label><input type="radio" name="dp-density" value="0.5"> 0.5x</label>
        <label><input type="radio" name="dp-density" value="1" checked> 1x</label>
        <label><input type="radio" name="dp-density" value="2"> 2x</label>
      </div>
    </div>
    <label class="dp-check">
      <input id="dp-regions" type="checkbox" checked>
      Region names
    </label>
    <button id="display-reset" type="button">Reset</button>
  </div>
</div>
<script>
const HIT_ZOOM = 10;                 // hover/click active at or past this zoom
const HIT_RADIUS = 14;               // px hit-test radius around the cursor
// degree-of-separation backend (Task 7). Render URL goes here when deployed.
const API_BASE = "http://localhost:8000";
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      dots: { type: "raster", tiles: [location.origin + "/data/tiles/{z}/{x}/{y}.png"],
              tileSize: 256, minzoom: 0, maxzoom: 10 }
    },
    layers: [
      { id: "bg", type: "background", paint: { "background-color": "#000000" } },
      { id: "dots", type: "raster", source: "dots",
        paint: { "raster-fade-duration": 150 } }
    ]
  },
  center: [0, 0], zoom: 1, minZoom: 0, maxZoom: 13, renderWorldCopies: false
});
map.addControl(new maplibregl.NavigationControl());

const tileCache = new Map();         // "z/x/y" -> {l:[...]} or null
async function fetchTile(z, x, y) {
  const k = `${z}/${x}/${y}`;
  if (!tileCache.has(k)) {
    tileCache.set(k, fetch(`/data/index/labels/${k}.json`)
      .then(r => r.ok ? r.json() : null).catch(() => null));
    if (tileCache.size > 600) tileCache.delete(tileCache.keys().next().value);
  }
  return tileCache.get(k);
}
function visibleTiles(lz) {
  const n = 1 << lz, b = map.getBounds();
  const m0 = maplibregl.MercatorCoordinate.fromLngLat(b.getNorthWest());
  const m1 = maplibregl.MercatorCoordinate.fromLngLat(b.getSouthEast());
  const tiles = [];
  const x0 = Math.max(0, Math.floor(m0.x * n)), x1 = Math.min(n - 1, Math.floor(m1.x * n));
  const y0 = Math.max(0, Math.floor(m0.y * n)), y1 = Math.min(n - 1, Math.floor(m1.y * n));
  for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) tiles.push([x, y]);
  return tiles;
}
const toLngLat = (xw, yw) => new maplibregl.MercatorCoordinate(xw, 1 - yw, 0).toLngLat();

// ---- author search ----
// normalize(): JS mirror of pipeline/build_index.py normalize(). Each step
// maps to the python line it must match bit-for-bit (shard keys are built
// server-side with the python version, so any drift here breaks lookups):
//   unicodedata.normalize("NFKD", name)                       -> name.normalize("NFKD")
//   "".join(c for c in s if not unicodedata.combining(c))     -> replace(/\p{M}/gu, "")
//   .lower()                                                  -> .toLowerCase()
//   c if (c.isalnum() or c == " ") else " " (per char;        -> replace(/[^\p{L}\p{N}]/gu, " ")
//     python isalnum() covers unicode letters+digits, not just ascii)
//   " ".join(s.split())                                       -> trim + collapse whitespace
function normalize(name) {
  let s = name.normalize("NFKD");
  s = s.replace(/\p{M}/gu, "");
  s = s.toLowerCase();
  s = s.replace(/[^\p{L}\p{N}]/gu, " ");
  s = s.trim().replace(/\s+/g, " ");
  return s;
}

const searchShardCache = new Map();  // shard key -> Promise<entries|null>; 404s cache as null; cap 20 FIFO
async function fetchSearchShard(key) {
  if (searchShardCache.has(key)) return searchShardCache.get(key);
  const p = fetch(`/data/index/search/${key}.json`)
    .then(r => r.ok ? r.json() : null)
    .catch(() => null);
  searchShardCache.set(key, p);
  if (searchShardCache.size > 20) searchShardCache.delete(searchShardCache.keys().next().value);
  return p;
}

// Shard fallback chain per pipeline/build_index.py's build_search_shards /
// _split_prefix_shard / _split_catchall_shard contract. The build side
// buckets each name by the first TWO chars of its concatenated normalized
// form: `key = head if len(head) == 2 and head.isascii() and head.isalpha()
// else "_"`, so a name lives in the prefix-shard tree only when BOTH of
// its first two chars are ascii letters ("sørensen" -> "_", not "so...").
// Mirror the same two-char gate here: for queries that pass it, walk
// prefix lengths from min(5, len) down to 2, deepest first, and stop at
// the first shard that exists (a 404 falls through to the next, shorter,
// prefix). Queries that fail the gate, or that exhaust every prefix level
// without finding a shard, fall through to the codepoint shard
// `_<cp % 32>`, then the plain `_` catch-all.
// Today's on-disk shards are still the old 2-char-only scheme (Task 8 adds
// the 5..2 recursive split), so in practice every 3+ char attempt 404s and
// this chain falls back to the 2-char shard -- exactly the behavior this
// fallback is designed for.
async function lookupSearchShard(norm) {
  const concat = norm.replace(/ /g, "");
  if (/^[a-z]{2}/.test(concat)) {
    for (let k = Math.min(5, concat.length); k >= 2; k--) {
      const entries = await fetchSearchShard(concat.slice(0, k));
      if (entries) return entries;
    }
    // every prefix level 404ed: fall through to the catch-all chain below
    // (belt and braces against future shard-scheme drift)
  }
  if (concat.length > 0) {
    const entries = await fetchSearchShard(`_${concat.codePointAt(0) % 32}`);
    if (entries) return entries;
  }
  return (await fetchSearchShard("_")) || [];
}

// entry shape: [norm, display_name, id, xw, yw, cited]
function rankSearchEntries(entries, norm) {
  const starts = [], contains = [];
  for (const e of entries) {
    if (e[0].startsWith(norm)) starts.push(e);
    else if (e[0].includes(norm)) contains.push(e);
  }
  starts.sort((a, b) => b[5] - a[5]);
  contains.sort((a, b) => b[5] - a[5]);
  return [...starts, ...contains].slice(0, 12);
}

const searchInput = document.getElementById("search-input");
const searchDropdown = document.getElementById("search-dropdown");
let searchResults = [];
let searchActive = -1;
let searchGen = 0;      // invalidates stale in-flight lookups
let searchTimer = null;
let highlightMarker = null;

function clearSearchHighlight() {
  if (highlightMarker) { highlightMarker.remove(); highlightMarker = null; }
}

function renderSearchDropdown() {
  searchDropdown.innerHTML = "";
  if (searchResults.length === 0) {
    const row = document.createElement("div");
    row.className = "row empty";
    row.textContent = "no matches";
    searchDropdown.appendChild(row);
  } else {
    searchResults.forEach((e, i) => {
      const row = document.createElement("div");
      row.className = "row" + (i === searchActive ? " active" : "");
      const name = document.createElement("span");
      name.textContent = e[1];
      const n = document.createElement("span");
      n.className = "n"; n.textContent = e[5].toLocaleString();
      row.append(name, n);
      row.addEventListener("mousedown", ev => { ev.preventDefault(); selectSearchEntry(e); });
      searchDropdown.appendChild(row);
    });
  }
  searchDropdown.classList.add("open");
}

function closeSearchDropdown() {
  searchDropdown.classList.remove("open");
  searchDropdown.innerHTML = "";
  searchResults = [];
  searchActive = -1;
}

function selectSearchEntry(e) {
  const [, , , xw, yw] = e;
  map.flyTo({ center: toLngLat(xw, yw), zoom: 10.5 });
  clearSearchHighlight();
  const el = document.createElement("div");
  el.className = "search-highlight";
  highlightMarker = new maplibregl.Marker({ element: el })
    .setLngLat(toLngLat(xw, yw)).addTo(map);
  closeSearchDropdown();
  searchInput.blur();
}

async function runSearch(query) {
  const gen = ++searchGen;
  const norm = normalize(query);
  if (!norm) { closeSearchDropdown(); return; }
  const entries = await lookupSearchShard(norm);
  if (gen !== searchGen) return;    // a newer query took over
  searchResults = rankSearchEntries(entries, norm);
  searchActive = -1;
  renderSearchDropdown();
}

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const query = searchInput.value;
  searchTimer = setTimeout(() => runSearch(query), 150);
});

searchInput.addEventListener("keydown", ev => {
  if (ev.key === "ArrowDown") {
    ev.preventDefault();
    if (searchResults.length) { searchActive = (searchActive + 1) % searchResults.length; renderSearchDropdown(); }
  } else if (ev.key === "ArrowUp") {
    ev.preventDefault();
    if (searchResults.length) {
      // from no selection (-1), wrap to the last row
      searchActive = (searchActive <= 0 ? searchResults.length : searchActive) - 1;
      renderSearchDropdown();
    }
  } else if (ev.key === "Enter") {
    ev.preventDefault();
    const pick = searchResults[searchActive >= 0 ? searchActive : 0];
    if (pick) selectSearchEntry(pick);
  } else if (ev.key === "Escape") {
    searchInput.value = "";
    clearTimeout(searchTimer);
    searchGen++;
    closeSearchDropdown();
    clearSearchHighlight();
  }
});

searchInput.addEventListener("blur", () => setTimeout(closeSearchDropdown, 100));

// ---- degree-of-separation path overlay (Task 7) ----
// Reuses the Task 6 lookup helpers (normalize/lookupSearchShard/rankSearchEntries)
// but keeps its own dropdown state per instance rather than reusing the global
// searchInput/searchDropdown/searchResults state above, since Connect needs two
// independent lookups (A and B) live at once.
function createAuthorLookup(inputEl, dropdownEl, onSelect) {
  let results = [], active = -1, gen = 0, timer = null;

  function render() {
    dropdownEl.innerHTML = "";
    if (results.length === 0) {
      const row = document.createElement("div");
      row.className = "row empty";
      row.textContent = "no matches";
      dropdownEl.appendChild(row);
    } else {
      results.forEach((e, i) => {
        const row = document.createElement("div");
        row.className = "row" + (i === active ? " active" : "");
        const name = document.createElement("span");
        name.textContent = e[1];
        const n = document.createElement("span");
        n.className = "n"; n.textContent = e[5].toLocaleString();
        row.append(name, n);
        row.addEventListener("mousedown", ev => { ev.preventDefault(); select(e); });
        dropdownEl.appendChild(row);
      });
    }
    dropdownEl.classList.add("open");
  }

  function close() {
    dropdownEl.classList.remove("open");
    dropdownEl.innerHTML = "";
    results = []; active = -1;
  }

  function select(e) {
    const [, name, id, xw, yw] = e;   // entry shape: [norm, display_name, id, xw, yw, cited]
    inputEl.value = name;
    close();
    inputEl.blur();
    onSelect({ id, name, xw, yw });
  }

  async function run(query) {
    const g = ++gen;
    const norm = normalize(query);
    if (!norm) { close(); return; }
    const entries = await lookupSearchShard(norm);
    if (g !== gen) return;
    results = rankSearchEntries(entries, norm);
    active = -1;
    render();
  }

  inputEl.addEventListener("input", () => {
    onSelect(null);            // typing invalidates any prior selection
    clearTimeout(timer);
    const query = inputEl.value;
    timer = setTimeout(() => run(query), 150);
  });
  inputEl.addEventListener("keydown", ev => {
    if (ev.key === "ArrowDown") {
      ev.preventDefault();
      if (results.length) { active = (active + 1) % results.length; render(); }
    } else if (ev.key === "ArrowUp") {
      ev.preventDefault();
      if (results.length) {
        active = (active <= 0 ? results.length : active) - 1;
        render();
      }
    } else if (ev.key === "Enter") {
      ev.preventDefault();
      const pick = results[active >= 0 ? active : 0];
      if (pick) select(pick);
    } else if (ev.key === "Escape") {
      inputEl.value = "";
      clearTimeout(timer);
      gen++;
      close();
      onSelect(null);
    }
  });
  inputEl.addEventListener("blur", () => setTimeout(close, 100));
}

const connectToggle = document.getElementById("connect-toggle");
const connectPanel = document.getElementById("connect-panel");
const connectAInput = document.getElementById("connect-a-input");
const connectADropdown = document.getElementById("connect-a-dropdown");
const connectBInput = document.getElementById("connect-b-input");
const connectBDropdown = document.getElementById("connect-b-dropdown");
const connectGo = document.getElementById("connect-go");
const connectClear = document.getElementById("connect-clear");
const connectStatus = document.getElementById("connect-status");

let connectA = null, connectB = null;    // {id, name, xw, yw} once selected
createAuthorLookup(connectAInput, connectADropdown, sel => { connectA = sel; });
createAuthorLookup(connectBInput, connectBDropdown, sel => { connectB = sel; });

function setPathStatus(text) { connectStatus.textContent = text || ""; }

connectToggle.addEventListener("click", () => {
  const on = connectPanel.classList.toggle("open");
  connectToggle.classList.toggle("active", on);
});

// /api/path expects the bare OpenAlex id ("A5108093963"); the map's own data
// (search entries, id-bucket shards) stores the full "https://openalex.org/..."
// form, so every id touched by the path feature is normalized through this.
function stripId(id) { return String(id).replace(/^https?:\/\/openalex\.org\//, ""); }
function idBucketNum(id) {
  const digits = stripId(id).replace(/\D/g, "");
  return digits ? parseInt(digits, 10) % 1000 : 0;
}

const idBucketCache = new Map();     // bucket number -> Promise<Map<bareId,[xw,yw]>|null>
async function fetchIdBucket(bucket) {
  if (!idBucketCache.has(bucket)) {
    idBucketCache.set(bucket, fetch(`/data/index/ids/${bucket}.json`)
      .then(r => r.ok ? r.json() : null)
      .then(raw => {
        if (!raw) return null;
        const m = new Map();
        for (const [k, v] of Object.entries(raw)) m.set(stripId(k), v);
        return m;
      })
      .catch(() => null));
  }
  return idBucketCache.get(bucket);
}

// nodes: [{id, name}] in path order. Returns an aligned array where each entry
// is either {xw, yw, ghost, name} or null (skipped: no resolved anchor on one
// side). Missing authors get ghost positions interpolated proportionally along
// the segment between the nearest resolved anchor on each side (a run of k
// unresolved nodes spreads out at t = 1/(k+1), 2/(k+1), ... instead of
// stacking at the midpoint); if there's no resolved anchor on one side
// (including being at either end of the path) the node is skipped.
async function resolvePathCoords(nodes) {
  const buckets = await Promise.all(nodes.map(n => fetchIdBucket(idBucketNum(n.id))));
  const hits = nodes.map((n, i) => {
    const m = buckets[i];
    const hit = m ? m.get(stripId(n.id)) : null;
    return hit ? { xw: hit[0], yw: hit[1] } : null;
  });
  return nodes.map((n, i) => {
    if (hits[i]) return { ...hits[i], ghost: false, name: n.name };
    let prevIdx = -1;
    for (let j = i - 1; j >= 0; j--) if (hits[j]) { prevIdx = j; break; }
    let nextIdx = -1;
    for (let j = i + 1; j < nodes.length; j++) if (hits[j]) { nextIdx = j; break; }
    if (prevIdx >= 0 && nextIdx >= 0) {
      const prev = hits[prevIdx], next = hits[nextIdx];
      const t = (i - prevIdx) / (nextIdx - prevIdx);
      return { xw: prev.xw + (next.xw - prev.xw) * t,
               yw: prev.yw + (next.yw - prev.yw) * t,
               ghost: true, name: n.name };
    }
    return null;
  });
}

let pathEventSource = null;
let pathMarkers = [];
let pathGen = 0;                     // invalidates stale in-flight renders (labelGen pattern)

function clearPath() {
  pathGen++;                         // any in-flight renderPath is now stale
  if (pathEventSource) { pathEventSource.close(); pathEventSource = null; }
  pathMarkers.forEach(m => m.remove());
  pathMarkers = [];
  if (map.getLayer("path-line")) map.removeLayer("path-line");
  if (map.getSource("path")) map.removeSource("path");
  map.setPaintProperty("dots", "raster-opacity", 1.0);
  setPathStatus("");
}
connectClear.addEventListener("click", clearPath);

async function renderPath(pathSteps, hops) {
  const gen = pathGen;               // stale once clearPath / a newer Go bumps it
  // /api/path with edges=coauthor should only ever return author ids, but
  // filter defensively in case a work-type node (id starting "W") interleaves.
  const nodes = pathSteps
    .filter(s => !String(s.author_id).startsWith("W"))
    .map(s => ({ id: s.author_id, name: s.author_name }));
  if (nodes.length === 0) { setPathStatus("no author path"); return; }

  const resolved = await resolvePathCoords(nodes);
  if (gen !== pathGen) return;       // a newer Go/Clear owns the overlay now
  const points = resolved.filter(Boolean);
  if (points.length < 2) { setPathStatus(`${hops} hops (too few resolved to draw)`); return; }

  const coords = points.map(p => toLngLat(p.xw, p.yw).toArray());
  map.addSource("path", {
    type: "geojson",
    data: { type: "Feature", geometry: { type: "LineString", coordinates: coords } },
  });
  map.addLayer({
    id: "path-line", type: "line", source: "path",
    paint: {
      "line-color": "#7fae8e", "line-width": 2.5,
      "line-blur": 1.5, "line-opacity": 0.9,
    },
  });

  pathMarkers = points.map(p => {
    const el = document.createElement("div");
    el.className = "path-node" + (p.ghost ? " ghost" : "");
    const dot = document.createElement("div");
    dot.className = "path-dot";
    const label = document.createElement("div");
    label.className = "path-label";
    label.textContent = p.name;
    el.append(dot, label);
    return new maplibregl.Marker({ element: el }).setLngLat(toLngLat(p.xw, p.yw)).addTo(map);
  });

  map.setPaintProperty("dots", "raster-opacity", 0.45);

  const bounds = coords.reduce(
    (b, c) => b.extend(c),
    new maplibregl.LngLatBounds(coords[0], coords[0])
  );
  map.fitBounds(bounds, { padding: 60, maxZoom: 11 });

  setPathStatus(`${hops} hops`);
}

connectGo.addEventListener("click", () => {
  if (!connectA || !connectB) { setPathStatus("select both authors"); return; }
  clearPath();    // starting a new Go clears any previous path first
  pathGen++;      // this Go owns the overlay from here (clearPath also bumps)
  const idA = stripId(connectA.id), idB = stripId(connectB.id);
  setPathStatus("searching…");
  pathEventSource = new EventSource(
    `${API_BASE}/api/path?from=${encodeURIComponent(idA)}&to=${encodeURIComponent(idB)}&edges=coauthor`
  );
  pathEventSource.addEventListener("progress", ev => {
    try { setPathStatus(JSON.parse(ev.data).message); } catch { /* ignore malformed frame */ }
  });
  pathEventSource.addEventListener("result", ev => {
    let data;
    try { data = JSON.parse(ev.data); } catch { return; }
    if (pathEventSource) { pathEventSource.close(); pathEventSource = null; }
    if (!data.found) { setPathStatus(data.reason || "no path found"); return; }
    renderPath(data.path, data.hops);
  });
  pathEventSource.addEventListener("app_error", ev => {
    let msg = "error";
    try { msg = JSON.parse(ev.data).message || msg; } catch { /* ignore malformed frame */ }
    setPathStatus(msg);
    if (pathEventSource) { pathEventSource.close(); pathEventSource = null; }
  });
});

// Greedy screen-rect collision test shared by drawLabels and drawRegions.
// `placed` holds {x, y, w, h} rects already committed for this redraw.
function collides(placed, x, y, w, h) {
  return placed.some(r => Math.abs(r.x - x) * 2 < r.w + w
                       && Math.abs(r.y - y) * 2 < r.h + h);
}

// ---- Task 1 (night-polish): display settings panel ----
// Sliders only ever touch brightness/contrast/saturation; raster-opacity stays
// owned by renderPath/clearPath (path-mode dimming) so the two stay orthogonal.
const DISPLAY_DEFAULTS = { brightness: 1.0, contrast: 0, saturation: 0, labelDensity: 1, regionNames: true };
const DISPLAY_KEY = "mapademic.display";

function loadDisplaySettings() {
  try {
    const raw = localStorage.getItem(DISPLAY_KEY);
    if (!raw) return { ...DISPLAY_DEFAULTS };
    return { ...DISPLAY_DEFAULTS, ...JSON.parse(raw) };
  } catch {
    return { ...DISPLAY_DEFAULTS };
  }
}
let displaySettings = loadDisplaySettings();

function saveDisplaySettings() {
  try { localStorage.setItem(DISPLAY_KEY, JSON.stringify(displaySettings)); } catch { /* ignore storage errors */ }
}

function applyDisplayPaint() {
  map.setPaintProperty("dots", "raster-brightness-max", displaySettings.brightness);
  map.setPaintProperty("dots", "raster-contrast", displaySettings.contrast);
  map.setPaintProperty("dots", "raster-saturation", displaySettings.saturation);
}

const dpGear = document.getElementById("display-gear");
const dpPanel = document.getElementById("display-panel");
const dpBrightness = document.getElementById("dp-brightness");
const dpBrightnessN = document.getElementById("dp-brightness-n");
const dpContrast = document.getElementById("dp-contrast");
const dpContrastN = document.getElementById("dp-contrast-n");
const dpSaturation = document.getElementById("dp-saturation");
const dpSaturationN = document.getElementById("dp-saturation-n");
const dpDensityRadios = document.querySelectorAll('input[name="dp-density"]');
const dpRegions = document.getElementById("dp-regions");
const dpReset = document.getElementById("display-reset");

function syncDisplayUI() {
  dpBrightness.value = displaySettings.brightness;
  dpBrightnessN.textContent = displaySettings.brightness.toFixed(2);
  dpContrast.value = displaySettings.contrast;
  dpContrastN.textContent = displaySettings.contrast.toFixed(2);
  dpSaturation.value = displaySettings.saturation;
  dpSaturationN.textContent = displaySettings.saturation.toFixed(2);
  dpDensityRadios.forEach(r => { r.checked = Number(r.value) === displaySettings.labelDensity; });
  dpRegions.checked = displaySettings.regionNames;
}
syncDisplayUI();

dpGear.addEventListener("click", () => {
  const open = dpPanel.classList.toggle("open");
  dpGear.setAttribute("aria-expanded", String(open));
});

dpBrightness.addEventListener("input", () => {
  displaySettings.brightness = Number(dpBrightness.value);
  dpBrightnessN.textContent = displaySettings.brightness.toFixed(2);
  map.setPaintProperty("dots", "raster-brightness-max", displaySettings.brightness);
  saveDisplaySettings();
});
dpContrast.addEventListener("input", () => {
  displaySettings.contrast = Number(dpContrast.value);
  dpContrastN.textContent = displaySettings.contrast.toFixed(2);
  map.setPaintProperty("dots", "raster-contrast", displaySettings.contrast);
  saveDisplaySettings();
});
dpSaturation.addEventListener("input", () => {
  displaySettings.saturation = Number(dpSaturation.value);
  dpSaturationN.textContent = displaySettings.saturation.toFixed(2);
  map.setPaintProperty("dots", "raster-saturation", displaySettings.saturation);
  saveDisplaySettings();
});
dpDensityRadios.forEach(r => r.addEventListener("change", () => {
  if (!r.checked) return;
  displaySettings.labelDensity = Number(r.value);
  saveDisplaySettings();
  drawLabels();
}));
dpRegions.addEventListener("change", () => {
  displaySettings.regionNames = dpRegions.checked;
  saveDisplaySettings();
  drawRegions();
});
dpReset.addEventListener("click", () => {
  displaySettings = { ...DISPLAY_DEFAULTS };
  try { localStorage.removeItem(DISPLAY_KEY); } catch { /* ignore storage errors */ }
  syncDisplayUI();
  applyDisplayPaint();
  drawLabels();
  drawRegions();
});

let markers = [];
let labelGen = 0;                    // invalidates stale in-flight redraws
async function drawLabels() {
  const gen = ++labelGen;
  const z = map.getZoom();
  if (z < 5.5) { markers.forEach(m => m.remove()); markers = []; return; }
  const lz = Math.max(6, Math.min(9, Math.round(z)));
  const lists = await Promise.all(visibleTiles(lz).map(([x, y]) => fetchTile(lz, x, y)));
  if (gen !== labelGen) return;      // a newer call owns the markers now
  markers.forEach(m => m.remove()); markers = [];
  const entries = lists.filter(Boolean).flatMap(t => t.l);
  entries.sort((a, b) => b[4] - a[4]);          // by citations desc
  const placed = [];                            // screen-space rects
  const baseCap = z >= 10 ? 150 : 60;
  const cap = Math.round(baseCap * displaySettings.labelDensity);
  for (const [name, id, xw, yw, cited] of entries) {
    if (markers.length >= cap) break;
    const pt = map.project(toLngLat(xw, yw));
    if (pt.x < -50 || pt.y < -20 || pt.x > innerWidth + 50 || pt.y > innerHeight + 20) continue;
    const size = 11 + Math.min(6, Math.log10(1 + cited));       // 11-17 px
    const w = name.length * size * 0.58, h = size + 6;
    if (collides(placed, pt.x, pt.y, w, h)) continue;
    placed.push({ x: pt.x, y: pt.y, w, h });
    const el = document.createElement("div");
    el.className = "lbl"; el.textContent = name;
    el.style.fontSize = size + "px";
    markers.push(new maplibregl.Marker({ element: el })
      .setLngLat(toLngLat(xw, yw)).addTo(map));
  }
}

let regions = [];
fetch("/data/regions.json").then(r => r.ok ? r.json() : []).catch(() => [])
  .then(j => { regions = j; drawRegions(); });
let regionMarkers = [];
function drawRegions() {
  regionMarkers.forEach(m => m.remove()); regionMarkers = [];
  if (!displaySettings.regionNames) return;
  const z = map.getZoom();
  if (z > 8) return;
  const sorted = [...regions].sort((a, b) => a.rank - b.rank);   // rank 1 first
  const placed = [];                                             // screen-space rects
  for (const r of sorted) {
    const zminByRank = 1.5 + 1.2 * Math.log10(r.rank);
    if (z < zminByRank) continue;
    const pt = map.project(toLngLat(r.xw, r.yw));
    if (pt.x < -50 || pt.y < -20 || pt.x > innerWidth + 50 || pt.y > innerHeight + 20) continue;
    const size = 13 + 6 * Math.min(1, r.members / 1_000_000);
    const w = r.name.length * size * 0.62, h = size + 6;
    if (collides(placed, pt.x, pt.y, w, h)) continue;
    placed.push({ x: pt.x, y: pt.y, w, h });
    const el = document.createElement("div");
    el.className = "region"; el.textContent = r.name;
    el.style.fontSize = size + "px";
    regionMarkers.push(new maplibregl.Marker({ element: el })
      .setLngLat(toLngLat(r.xw, r.yw)).addTo(map));
  }
}

fetch("/data/index/legend.json").then(r => r.ok ? r.json() : []).catch(() => [])
  .then(entries => {
    const box = document.getElementById("legend-rows");
    for (const e of entries.slice(0, 25)) {
      const row = document.createElement("div"); row.className = "row";
      const sw = document.createElement("span");
      sw.className = "sw"; sw.style.background = e.color;
      const label = document.createElement("span");
      label.textContent = e.name || e.field || "Community " + e.community;
      const n = document.createElement("span");
      n.className = "n"; n.textContent = (e.members / 1e6).toFixed(1) + "M";
      row.append(sw, label, n);
      box.appendChild(row);
    }
  });

const tip = document.getElementById("tip");
async function hitTest(pt) {
  if (map.getZoom() < HIT_ZOOM) return null;
  // Candidate tiles come from the four corners of the hit box, so dots just
  // across a z9 tile boundary are still found (2-4 tiles worst case).
  const n = 1 << 9, seen = new Set(), tiles = [];
  for (const dx of [-HIT_RADIUS, HIT_RADIUS]) for (const dy of [-HIT_RADIUS, HIT_RADIUS]) {
    const m = maplibregl.MercatorCoordinate.fromLngLat(
      map.unproject([pt.x + dx, pt.y + dy]));
    const tx = Math.min(n - 1, Math.max(0, Math.floor(m.x * n)));
    const ty = Math.min(n - 1, Math.max(0, Math.floor(m.y * n)));  // label tiles are keyed by mercator y, same as visibleTiles
    const k = `${tx}/${ty}`;
    if (!seen.has(k)) { seen.add(k); tiles.push([tx, ty]); }
  }
  const lists = await Promise.all(tiles.map(([x, y]) => fetchTile(9, x, y)));
  let best = null, bestD = HIT_RADIUS;
  for (const t of lists) {
    if (!t) continue;
    for (const e of t.l) {
      const p = map.project(toLngLat(e[2], e[3]));
      const d = Math.hypot(p.x - pt.x, p.y - pt.y);
      if (d < bestD) { bestD = d; best = e; }
    }
  }
  return best;
}
map.on("mousemove", async ev => {
  const hit = await hitTest(ev.point);
  map.getCanvas().style.cursor = hit ? "pointer" : "";
  if (hit) {
    tip.style.display = "block";
    tip.style.left = (ev.point.x + 14) + "px";
    tip.style.top = (ev.point.y + 14) + "px";
    tip.textContent = `${hit[0]} - ${hit[4].toLocaleString()} citations`;
  } else tip.style.display = "none";
});
map.on("click", async ev => {
  const hit = await hitTest(ev.point);
  if (!hit) return;
  const url = String(hit[1]).startsWith("http") ? hit[1] : "https://openalex.org/" + hit[1];
  window.open(url, "_blank", "noopener");
});
map.on("load", () => { applyDisplayPaint(); drawLabels(); drawRegions(); });
map.on("moveend", () => { drawLabels(); drawRegions(); });
map.on("zoomend", () => { drawLabels(); drawRegions(); });
</script>
